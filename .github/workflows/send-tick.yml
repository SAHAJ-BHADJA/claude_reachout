name: send-tick

# Pings the app's /cron/tick every 5 minutes so queued emails send automatically
# (respecting the throttle, daily cap, and sending window) with no laptop needed.
# GitHub Actions is free for public repos. CRON_SECRET is a repo secret (never in code).

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # lets you run it manually too

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Ping send tick
        run: |
          curl -s -m 60 -X POST \
            "https://claude-reachout.onrender.com/cron/tick?secret=${{ secrets.CRON_SECRET }}" \
            -o response.txt -w "HTTP %{http_code}\n" || true
          echo "Response:"; cat response.txt || true
